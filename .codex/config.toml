# Coworx local Codex project configuration.
# Keep project behavior explicit. Do not place secrets in this file.

[project]
name = "Coworx"
mode = "codex-native-coworker"

[coworx]
parallel_by_default = true
lock_resources_not_agents = true
model_execution_routing = true
delegate_first_wave = true
browser_lanes_parallel = true
computer_use_target_locks = true
computer_use_operator_lane = true
playwright_for_structured_browser = true
browser_use_for_in_app_local_public = true
computer_use_fallback = true
autofill_is_opportunistic = true
local_credential_fallback = true
chat_secret_direct_use = false
chat_secret_intake_allowed = true
secure_credential_capture_required = true
credential_reference_required = true
# Never store secrets by default. Explicit user grants use the Coworx local
# credential memory settings below.
store_secrets = false
credential_memory_available = true
coworx_local_secret_store_enabled = true
credential_persistence_requires_explicit_user_grant = true
default_secret_backend = "ignored_private_file_reference"
chrome_password_manager_is_not_coworx_memory = true
model_memory_is_not_credential_memory = true
default_action_level = 0

[paths]
queue = "queue"
memory = "memory"
runs = "runs"
operator = "operator"
outputs = "outputs"
evals = "evals"
docs = "docs"
