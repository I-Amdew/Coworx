# Coworx local Codex project configuration.
# Keep project behavior explicit. Do not place secrets in this file.

[project]
name = "Coworx"
mode = "codex-native-coworker"

[coworx]
parallel_by_default = true
lock_resources_not_agents = true
browser_lanes_parallel = true
computer_use_target_locks = true
playwright_for_structured_browser = true
browser_use_for_in_app_local_public = true
computer_use_fallback = true
store_secrets = false
default_action_level = 0

[paths]
queue = "queue"
memory = "memory"
runs = "runs"
operator = "operator"
outputs = "outputs"
evals = "evals"
docs = "docs"
